<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .ios-only { display: none; text-align: center; }
        .btn { background: #007AFF; color: #fff; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ios-ui" class="ios-only">
        <p>Для продолжения нажмите на кнопку:</p><br>
        <a href="https://www.google.com" target="_blank" class="btn">ОТКРЫТЬ В БРАУЗЕРЕ</a>
    </div>

    <script>
        var url = "https://www.google.com";
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        if (isIOS) {
            // Показываем кнопку для iPhone
            document.getElementById('ios-ui').style.display = 'block';
        } else {
            // Шлем Android через Intent (авто-выброс)
            var intentUrl = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            window.location.replace(intentUrl);
            
            // Если не сработало за 1 сек - обычный редирект
            setTimeout(function() { window.location.href = url; }, 1000);
        }
    </script>
</body>
</html>
